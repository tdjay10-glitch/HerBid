          transform: translateY(12px);

        to {

          transform: translateY(0);

      }

      @keyframes softPulse {
        0%, 100% {

          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.18);
        }
      }

        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;

                  <div className="mb-5 grid gap-3 lg:grid-cols-[1fr_170px_150px_190px]">
                    <label className="flex h-12 items-center gap-3 rounded-lg border border-slate-200 bg-white px-4 shadow-sm focus-within:border-plum-500 focus-within:ring-4 focus-within:ring-plum-100">
                      <Icon name="search" className="h-5 w-5 text-slate-400" />
                      <input
                        value={query}
                        onChange={(event) => setQuery(event.target.value)}
                        className="w-full bg-transparent text-sm font-medium text-slate-700 outline-none placeholder:text-slate-400"
                        placeholder="Search by keyword or agency"
                      />
                    </label>
                    <SelectFilter
                      label="NAICS"
                      value={naics}
                      onChange={setNaics}
                      options={["All NAICS", "541512", "561210", "541611", "541519"]}
                    />
                    <SelectFilter
                      label="State"
                      value={state}
                      onChange={setState}
                      options={["All States", "VA", "DC", "MD", "NC"]}
                    />
                    <SelectFilter
                      label="Certification"
                      value={certification}
                      onChange={setCertification}
                      options={["All Certifications", "WOSB", "EDWOSB", "MBE", "8(a)"]}
                    />
                  </div>

	                  <div className="mb-5 grid gap-3 sm:grid-cols-3">
	                    <Stat label="Open matches" value={filtered.length} />
	                    <Stat label="Saved bids" value={savedCount} />
	                    <Stat label="AI matching" value="Soon" />
	                  </div>

                  <div className="grid gap-4">
                    {filtered.map((opportunity) => (
                      <OpportunityCard
                        key={opportunity.title}
                        opportunity={opportunity}
                        onSave={handleSave}
                      />
                    ))}
                    {!filtered.length && (
                      <div className="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center">
                        <p className="font-bold text-slate-800">No opportunities match those filters.</p>
                        <p className="mt-2 text-sm text-slate-500">Try widening the NAICS, state, or certification filter.</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function Stat({ label, value }) {
        return (
          <div className="rounded-lg border border-slate-200 bg-white p-4">
            <p className="text-sm font-semibold text-slate-500">{label}</p>
            <p className="mt-2 text-2xl font-extrabold text-ink">{value}</p>
          </div>
        );
      }

      function App() {
        const [heroItems, setHeroItems] = useState(opportunities);
        const [mobileOpen, setMobileOpen] = useState(false);

        useEffect(() => {
          function scrollToHash() {
            if (!window.location.hash) return;
            const scroll = () => document.querySelector(window.location.hash)?.scrollIntoView({ block: "start" });
            window.requestAnimationFrame(scroll);
            window.setTimeout(scroll, 80);
            window.setTimeout(scroll, 250);
            window.setTimeout(scroll, 600);
          }

          scrollToHash();
          window.addEventListener("hashchange", scrollToHash);
          return () => window.removeEventListener("hashchange", scrollToHash);
        }, []);

        function handleHeroSave(title) {
          setHeroItems((current) =>
            current.map((item) => (item.title === title ? { ...item, saved: !item.saved } : item))
          );
        }

        return (
          <div className="min-h-screen overflow-hidden">
            <header className="sticky top-0 z-40 border-b border-slate-200 bg-white/90 backdrop-blur">
              <div className="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
                <a href="#" className="flex items-center gap-3" aria-label="HerBid home">
                  <img
                    src="assets/herbid-logo.png"
                    alt="HerBid"
                    decoding="async"
                    className="h-12 w-12 rounded-full object-cover shadow-sm ring-2 ring-harvest-300/70"
                  />
                  <span className="text-lg font-extrabold tracking-tight text-ink">HerBid</span>
                </a>
                <nav className="hidden items-center gap-7 text-sm font-semibold text-slate-600 lg:flex">
                  <a href="#benefits" className="transition hover:text-plum-700">Benefits</a>
                  <a href="#audience" className="transition hover:text-plum-700">Who it helps</a>
                  <a href="#product" className="transition hover:text-plum-700">Product</a>
                  <a href="dashboard.html" className="transition hover:text-plum-700">Dashboard</a>
                  <a href="#pricing" className="transition hover:text-plum-700">Pricing</a>
                  <a href="#trust" className="transition hover:text-plum-700">Trust</a>
                </nav>
                <div className="hidden items-center gap-3 lg:flex">
	                  <a href="dashboard.html" className="text-sm font-bold text-plum-700">View dashboard</a>
                  <ButtonLink href="#signup" className="px-4 py-2.5">Join waitlist</ButtonLink>
                </div>
                <button
                  className="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 text-plum-900 transition hover:border-plum-200 hover:bg-plum-50 lg:hidden"
                  onClick={() => setMobileOpen((open) => !open)}
                  aria-label={mobileOpen ? "Close menu" : "Open menu"}
                  aria-expanded={mobileOpen}
                >
                  <Icon name={mobileOpen ? "close" : "menu"} className="h-5 w-5" />
                </button>
              </div>
              {mobileOpen && (
                <div className="border-t border-slate-200 bg-white px-4 py-4 shadow-soft lg:hidden">
                  <nav className="grid gap-2 text-sm font-bold text-slate-700">
                    {[
                      ["Benefits", "#benefits"],
                      ["Who it helps", "#audience"],
                      ["Product", "#product"],
                      ["Dashboard", "dashboard.html"],
                      ["Pricing", "#pricing"],
                      ["Trust", "#trust"]
                    ].map(([label, href]) => (
                      <a
                        key={label}
                        href={href}
                        onClick={() => setMobileOpen(false)}
                        className="rounded-lg px-3 py-2 transition hover:bg-plum-50 hover:text-plum-700"
                      >
                        {label}
                      </a>
                    ))}
                  </nav>
                  <ButtonLink href="#signup" className="mt-3 w-full" onClick={() => setMobileOpen(false)}>
                    Join waitlist
                  </ButtonLink>
                </div>
              )}
            </header>

            <main>
              <section className="relative overflow-hidden bg-[linear-gradient(180deg,#ffffff_0%,#fbf7ff_58%,#ffffff_100%)] py-14 sm:py-20 lg:py-24">
                <div className="mx-auto grid max-w-7xl items-center gap-12 px-4 sm:px-6 lg:grid-cols-[0.92fr_1.08fr] lg:px-8">
                  <div>
                    <div className="mb-6 inline-flex items-center gap-2 rounded-full border border-plum-200 bg-white px-4 py-2 text-sm font-bold text-plum-700 shadow-sm">
                      <Icon name="shield" className="h-4 w-4 text-harvest-500" />
                      Procurement made clearer for women-owned businesses
                    </div>
                    <h1 className="max-w-3xl text-4xl font-extrabold tracking-tight text-ink sm:text-5xl lg:text-6xl">
                      Find government contracts you can actually pursue.
                    </h1>
                    <p className="mt-6 max-w-2xl text-lg leading-8 text-slate-600">
                      HerBid helps women-owned businesses search procurement opportunities, filter by NAICS and certifications,
                      save promising bids, and track deadlines in one simple workspace.
                    </p>
                    <div className="mt-8 flex flex-col gap-3 sm:flex-row">
                      <ButtonLink href="#signup" className="px-6 py-3.5 text-base">
                        Join the waitlist
                        <Icon name="arrow" className="h-4 w-4" />
                      </ButtonLink>
                      <ButtonLink href="dashboard.html" variant="secondary" className="px-6 py-3.5 text-base">
	                        Preview dashboard
                      </ButtonLink>
                    </div>
                    <div className="mt-8 flex flex-wrap gap-2">
                      {trustSignals.map((signal) => (
                        <span key={signal} className="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 shadow-sm">
                          <Icon name="check" className="h-3.5 w-3.5 text-plum-700" />
                          {signal}
                        </span>
                      ))}
                    </div>
                    <div className="mt-9 grid max-w-2xl grid-cols-1 gap-3 sm:grid-cols-3">
                      <HeroMetric value="$2.4B" label="Tracked opportunities" />
                      <HeroMetric value="50+" label="Portal sources" />
                      <HeroMetric value="$0" label="To start" />
                    </div>
                  </div>
                  <DashboardPreview items={heroItems} onSave={handleHeroSave} />
                </div>
              </section>

              <BidPath />

	              <section id="benefits" className="border-y border-plum-100 bg-white py-16 sm:py-20">
                <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                  <div className="mx-auto max-w-3xl text-center">
                    <SectionHeading
	                      eyebrow="Clear, focused, founder-friendly"
	                      title="A procurement workspace made for owners who do not have time to decode every portal."
                    />
                  </div>
                  <div className="mt-10 grid gap-4 md:grid-cols-3">
                    {benefits.map((benefit, index) => (
                      <div key={benefit.title} className="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
                        <div className="mb-5 flex h-11 w-11 items-center justify-center rounded-lg bg-plum-100 text-plum-700">
                          <Icon name={index === 0 ? "search" : index === 1 ? "chart" : "shield"} />
                        </div>
                        <h3 className="text-lg font-bold text-ink">{benefit.title}</h3>
                        <p className="mt-3 text-sm leading-6 text-slate-600">{benefit.copy}</p>
                      </div>
                    ))}
                  </div>
                </div>
	              </section>

	              <AudienceSection />

	              <ProductShowcase />

	              <TrustSection />

	              <ProcurementDashboard />

	              <PricingSection />

	              <SignupPanel />

	              <LegalLinksSection />

	              <Footer />
	            </main>
          </div>
        );
      }

      function HeroMetric({ value, label }) {
        return (
          <div className="rounded-lg border border-plum-100 bg-white p-4 shadow-sm">
            <p className="text-2xl font-extrabold text-plum-700">{value}</p>
            <p className="mt-1 text-xs font-semibold leading-5 text-slate-500">{label}</p>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
